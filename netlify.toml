[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/upload"
  to = "/.netlify/functions/upload"
  status = 200

[[redirects]]
  from = "/batch/:fileId/status"
  to = "/.netlify/functions/batchStatus/:fileId"
  status = 200

[[redirects]]
  from = "/reconcile/:fileId"
  to = "/.netlify/functions/reconcile/:fileId"
  status = 200
